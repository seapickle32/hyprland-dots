source = $HOME/.config/hypr/modules/decoration/scheme_default.conf

decoration {
    rounding = $decoration_rounding
    rounding_power = $decoration_rounding_power

    active_opacity = $active_opacity
    inactive_opacity = $inactive_opacity

    shadow {
        enabled = $shadow_enabled
        range = $shadow_range
        render_power = $shadow_render_power
        color = $shadow_color
    }

    blur {
        enabled = $blur_enabled
        size = $blur_size
        passes = $blur_passes
        vibrancy = $blur_vibrancy
    }
}

