#################################################
#                 APPLICATIONS
#################################################

$terminal = kitty
$browser = zen-browser
$files = dolphin
$tui_files = yazi
$notes = obsidian
$music = spotify-launcher
$game_launcher = steam


#################################################
#                 MONITORS
#################################################

# --- Internal Display (Laptop) ---
$monitor_internal = eDP-1
$internal_resolution = 1920x1080@144
$internal_position = auto
$internal_scale = 1

# --- External Display ---
$monitor_external = HDMI-A-1
$external_resolution = 3840x2160@60
$external_position = auto
$external_scale = 1


#################################################
#                 GENERAL LAYOUT
#################################################

$gaps_in = 20
$gaps_out = 50
$border_size = 5

$active_border_col1 = rgba(ca9ee6ff)
$active_border_col2 = rgba(f2d5cfff)
$active_border_angle = 45deg

$inactive_border_col1 = rgba(b4befecc)
$inactive_border_col2 = rgba(6c7086cc)
$inactive_border_angle = 45deg

$resize_on_border = false
$allow_tearing = false
$layout = scrolling


#################################################
#                 DECORATION
#################################################

$decoration_rounding = 0
$decoration_rounding_power = 0

$active_opacity = 0.8
$inactive_opacity = 0.8

$shadow_enabled = true
$shadow_range = 4
$shadow_render_power = 3
$shadow_color = rgba(1a1a1aee)

$blur_enabled = true
$blur_size = 6
$blur_passes = 3
$blur_vibrancy = 0.1696


#################################################
#                 INPUT
#################################################

# --- Keyboard ---
$kb_layout = us
$kb_variant =
$kb_model =
$kb_options =
$kb_rules =

# --- Mouse ---
$follow_mouse = 1
$global_sensitivity = 0

# --- Touchpad ---
$touchpad_natural_scroll = false

# --- Gestures ---
$gesture_fingers = 3
$gesture_direction = horizontal
$gesture_action = workspace

# --- Specific Device ---
$device_name = epic-mouse-v1
$device_sensitivity = -0.5


#################################################
#                 LAYOUT ENGINES
#################################################

# --- Dwindle ---
$dwindle_pseudotile = true
$dwindle_preserve_split = true

# --- Master ---
$master_new_status = master


#################################################
#                 PLUGINS
#################################################

# --- Hyprexpo ---
$expo_columns = 3
$expo_gap_size = 3
$expo_bg_color = rgb(111111)
$expo_workspace_method = center current
$expo_gesture_distance = 300

# --- Hyprscrolling ---
#$scroll_focus_fit_method = 1
$scroll_follow_focus = true
$scroll_column_width = 0.5
$scroll_fullscreen_one_column = true
$scroll_max_columns = 2


#################################################
#                 WINDOW RULES
#################################################

# --- Suppress Maximize ---
$rule_suppress_class = .*
$rule_suppress_event = maximize

# --- XWayland Drag Fix ---
$rule_xwayland_class = ^$
$rule_xwayland_title = ^$
$rule_xwayland_enabled = true
$rule_xwayland_float = true
$rule_xwayland_fullscreen = false
$rule_xwayland_pin = false
$rule_xwayland_no_focus = true

# --- Hyprland Run Window ---
$run_class = hyprland-run
$run_move_position = 20 monitor_h-120
$run_float = yes


#################################################
#                 PERMISSIONS
#################################################

$hyprpm_path = /usr/(bin|local/bin)/hyprpm
$hyprpm_permission_type = plugin
$hyprpm_permission_action = allow


#################################################
#                 NVIDIA
#################################################

$env_libva = nvidia
$env_glx_vendor = nvidia
$env_gbm_backend = nvidia-drm

# --- Optional Nvidia VAAPI ---
#$env_nvd_backend = direct

# --- Cursor ---
$no_hardware_cursors = false
#$allow_dumb_copy = true


#################################################
#                 THEME CORE
#################################################

$qt_platform_theme = qt6ct
$qt_disable_window_deco = 1
$qt_auto_scale = 1

$cursor_theme = Bibata-Modern-Classic
$cursor_size = 24

$qt_style = Fusion
$qt_color_scheme = Darker
$qt_font = CaskaydiaCove Nerd Mono
$qt_font_size = 12
$qt_icon_theme = Tela-circle-dracula-dark


#################################################
#             TOOLKIT BACKENDS
#################################################

$gdk_backend = wayland,x11
$qt_platform = wayland;xcb
$sdl_videodriver = wayland,x11,windows
$clutter_backend = wayland
$electron_ozone_hint = auto


#################################################
#             XDG SPECIFICATIONS
#################################################

$xdg_current_desktop = Hyprland
$xdg_session_type = wayland
$xdg_session_desktop = Hyprland


#################################################
#                 MISC
#################################################

$force_default_wallpaper = 1
$disable_hyprland_logo = false
$java_wm_nonreparenting = 1

